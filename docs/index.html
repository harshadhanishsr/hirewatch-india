<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#020b18;--s1:#060f20;--s2:#0c1a30;--s3:#111f35;
  --card:rgba(255,255,255,.05);--border:rgba(255,255,255,.08);--b2:rgba(255,255,255,.14);
  --text:#e8edf5;--muted:#6b7a96;--faint:#94a3b8;
  --green:#10b981;--red:#f43f5e;--blue:#3b82f6;
  --purple:#8b5cf6;--amber:#f59e0b;--cyan:#06b6d4;
  --gold:#fbbf24;--silver:#94a3b8;--bronze:#c2845a;
}
html,body{width:100vw;height:100vh;overflow:hidden;background:var(--bg);color:var(--text);
  font-family:'Segoe UI',system-ui,-apple-system,sans-serif;font-size:14px;}
body{display:flex;flex-direction:column;}

/* TICKER */
#ticker{height:34px;flex-shrink:0;background:linear-gradient(90deg,rgba(6,182,212,.1),rgba(139,92,246,.1));
  border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px;overflow:hidden;}
.tick-label{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--cyan);
  white-space:nowrap;border-right:1px solid var(--border);padding-right:12px;}
#tick-text{font-size:12px;color:var(--faint);transition:opacity .4s;}
#tick-text.fade{opacity:0;}

/* HEADER */
#header{height:56px;flex-shrink:0;display:flex;align-items:center;gap:12px;padding:0 16px;
  background:var(--s1);border-bottom:1px solid var(--border);}
.logo{display:flex;align-items:center;gap:10px;white-space:nowrap;}
.logo-icon{width:34px;height:34px;border-radius:8px;font-size:17px;
  background:linear-gradient(135deg,#06b6d4,#8b5cf6);display:flex;align-items:center;justify-content:center;}
.logo-name{font-size:15px;font-weight:800;background:linear-gradient(135deg,#06b6d4,#8b5cf6);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.logo-sub{font-size:9px;color:var(--muted);letter-spacing:.5px;}
#answers{display:flex;gap:8px;flex:1;overflow:hidden;}
.ans{flex:1;background:var(--card);border:1px solid var(--border);border-radius:8px;
  padding:6px 10px;display:flex;align-items:center;gap:8px;cursor:pointer;
  transition:all .2s;position:relative;overflow:hidden;}
.ans:hover{border-color:var(--ac,var(--cyan));background:rgba(255,255,255,.07);}
.ans::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--ac,var(--cyan));}
.ans-icon{font-size:16px;}
.ans-q{font-size:9px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px;}
.ans-city{font-size:13px;font-weight:800;color:var(--ac,var(--text));line-height:1.2;}
.ans-val{font-size:10px;color:var(--faint);margin-top:1px;}
.live-wrap{display:flex;align-items:center;gap:7px;white-space:nowrap;
  background:var(--card);border:1px solid var(--border);border-radius:20px;padding:5px 10px;}
.dot{width:6px;height:6px;border-radius:50%;background:var(--green);}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.dot{animation:blink 1.5s infinite;}
.live-wrap span{font-size:10px;color:var(--muted);}
.live-wrap strong{font-size:10px;color:var(--green);}
#clock{font-size:10px;color:var(--muted);}

/* MAIN */
#main{display:flex;flex:1;overflow:hidden;min-height:0;}
#map{flex:1;min-width:0;background:#040d1a;}

/* PANEL */
#panel{width:380px;flex-shrink:0;display:flex;flex-direction:column;
  background:var(--s1);border-left:1px solid var(--border);overflow:hidden;}

/* MODE BAR */
#mode-bar{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;}
.mbt{flex:1;padding:10px 2px;text-align:center;font-size:10px;font-weight:700;
  letter-spacing:.3px;cursor:pointer;color:var(--muted);border:none;background:none;
  border-bottom:2px solid transparent;transition:all .2s;}
.mbt.on{color:var(--mc,var(--cyan));border-bottom-color:var(--mc,var(--cyan));background:rgba(255,255,255,.03);}

/* SEARCH BAR */
#search-wrap{padding:10px 12px;border-bottom:1px solid var(--border);flex-shrink:0;position:relative;}
#si{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:7px;
  padding:8px 36px 8px 12px;color:var(--text);font-size:12px;outline:none;}
#si:focus{border-color:var(--cyan);}
#si::placeholder{color:var(--muted);}
#search-clear{position:absolute;right:20px;top:50%;transform:translateY(-50%);
  color:var(--muted);cursor:pointer;font-size:14px;display:none;}
#search-clear:hover{color:var(--text);}
#search-type{display:flex;gap:6px;margin-top:7px;}
.st-btn{flex:1;padding:4px 0;font-size:10px;font-weight:600;border-radius:5px;border:1px solid var(--border);
  background:none;color:var(--muted);cursor:pointer;transition:all .15s;text-align:center;}
.st-btn.on{background:var(--cyan);color:#020b18;border-color:var(--cyan);}

/* PANEL HEADER */
#ph{padding:10px 14px 8px;border-bottom:1px solid var(--border);flex-shrink:0;}
#ph-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:2px;}
#ph-sub{font-size:10px;color:var(--muted);}
#ph-crumb{font-size:10px;color:var(--muted);margin-top:3px;display:none;}
.crumb-link{color:var(--cyan);cursor:pointer;}
.crumb-link:hover{text-decoration:underline;}

/* CONTENT */
#pc{flex:1;overflow-y:auto;}
#pc::-webkit-scrollbar{width:3px;}
#pc::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
</style>
</head>

.co-stat-l{font-size:9px;color:var(--muted);}

  letter-spacing:.8px;padding:10px 14px 6px;border-top:1px solid var(--border);}

/* SECTOR BAR */
#sbar{height:30px;flex-shrink:0;display:flex;background:var(--s1);border-top:1px solid var(--border);overflow:hidden;}
.sb-seg{display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;

// Build company index
const CO_BY_CITY = {};
const CO_BY_NAME = {};

// Current live DB — starts with seed, gets replaced by pipeline data
let COMPANIES_DB = [...COMPANIES_DB_SEED];

function rebuildIndex(){
  Object.keys(CO_BY_CITY).forEach(k=>delete CO_BY_CITY[k]);
  Object.keys(CO_BY_NAME).forEach(k=>delete CO_BY_NAME[k]);
  COMPANIES_DB.forEach(c=>{
    if(!CO_BY_CITY[c.city]) CO_BY_CITY[c.city]=[];
    CO_BY_CITY[c.city].push(c);
    CO_BY_NAME[c.name.toLowerCase()]=c;
  });
}
rebuildIndex();

// ── Load live pipeline data (replaces seed with real scraped companies) ──
fetch('data/companies_all.json')
  .then(r=>r.json())
  .then(data=>{
    if(data.companies && data.companies.length > 0){
      COMPANIES_DB = data.companies.map(c=>({
        name:    c.name,
        city:    c.city,
        sector:  c.sector || 'Other',
        size:    c.size   || '—',
        status:  c.status || 'mixed',
        hiring:  c.hiring  || 0,
        layoffs: c.layoffs || 0,
        trend:   Array.isArray(c.trend) ? c.trend : [50],
        founded: c.founded || '',
        hq:      c.city,
        is_new:  c.is_new  || false,
        news_headlines: c.news_headlines || [],
      }));
      rebuildIndex();
      // Re-render current view with live data
      if(curCity) openCity(curCity);
      else if(typeof curMode!=='undefined'&&curMode!=='search') renderRankings(curMode);
      // Announce new companies in ticker
      const newCount = data.new_this_run || 0;
      if(newCount > 0){
        INSIGHTS.unshift(`🆕 ${newCount} new ${newCount===1?'company':'companies'} discovered this run`);
      }
      document.getElementById('tick-text').textContent =
        `✅ Live data: ${data.total} companies across ${Object.keys(CO_BY_CITY).length} cities · Updated ${data.updated_at}`;
    }
  })
  .catch(()=>{ /* silently use seed data */ });

let DISTRICTS = [];
let curMode   = 'hiring';
let curCity   = null;
let curCo     = null;
let searchType= 'all';
let searchQ   = '';

const map = L.map('map',{center:[20.5937,78.9629],zoom:5,attributionControl:false});
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{maxZoom:19}).addTo(map);

<script>
// ── Data loading ────────────────────────────────────────────────
fetch('data/india_summary.json')
  .then(r=>r.json())
  .then(d=>init(d.districts||[]))
  .catch(()=>init([]));

function init(raw){
  DISTRICTS = raw.filter(d=>d.city).map(d=>({
    id:       d.city.toLowerCase().replace(/ /g,'_'),
    name:     d.city,
    lat:      d.lat, lng: d.lng,
    hiring:   d.total_hiring   ||0,
    layoffs:  d.total_layoffs  ||0,
    companies:d.total_companies||0,
    growth:   d.growth_score   ||0,
    sentiment:d.avg_sentiment  ||0,
  }));
  ['hiring','layoffs','companies','growth'].forEach(m=>{
    [...DISTRICTS].sort((a,b)=>b[m]-a[m]).forEach((d,i)=>{d['r_'+m]=i+1;});
  });
  updateAnswerCards();
  buildMarkers('hiring');
  renderRankings('hiring');
  buildSectorBar();
  document.getElementById('tick-text').textContent=INSIGHTS[0];
}

// ── Map markers ──────────────────────────────────────────────────
function buildMarkers(mode){
  markerLayer.clearLayers();
  const key = mode==='search'?'hiring':mode;
  DISTRICTS.forEach(d=>{
    const cfg=MODE[key], c=cfg.color;
    const vals=DISTRICTS.map(x=>x[key]);
    const maxV=Math.max(...vals),minV=Math.min(...vals);
    const t=maxV===minV?.5:(d[key]-minV)/(maxV-minV);
    const sz=Math.round(16+t*50);
    const rank=d['r_'+key];
    const glow=rank<=3?`box-shadow:0 0 ${sz/2}px ${c}66;`:'';
    const nc=rank===1?'#fbbf24':rank===2?'#94a3b8':rank===3?'#c2845a':c;
    const ns=`font-size:${Math.max(9,Math.round(sz*.32))}px;font-weight:900;color:${nc};`;
    const badge=rank<=10?`<span style="${ns}">${rank}</span>`:'';
    const fire=rank===1?`<div style="position:absolute;top:-8px;right:-6px;font-size:13px;">🔥</div>`:'';
    const val=key==='growth'?`+${d[key].toFixed(1)}`:d[key].toLocaleString();
    const cos=CO_BY_CITY[d.name]||[];
    const hiCos=cos.filter(c=>c.status==='hiring').length;
    const laCos=cos.filter(c=>c.status==='layoff').length;
    const tt=`<div style="background:#0c1a30;border:1px solid rgba(255,255,255,.14);border-radius:10px;padding:12px 16px;min-width:200px;">
      <div style="font-weight:800;font-size:14px;margin-bottom:6px;">${d.name}</div>
      <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
        <span style="font-size:11px;color:#94a3b8;">${cfg.icon} ${cfg.label}</span>
        <span style="font-size:15px;font-weight:800;color:${c};">${val}</span>
      </div>
      <div style="display:flex;gap:10px;padding-top:6px;border-top:1px solid rgba(255,255,255,.07);margin-bottom:6px;">
        <span style="font-size:11px;color:#10b981;">▲ ${d.hiring.toLocaleString()} hiring</span>
        <span style="font-size:11px;color:#f43f5e;">▼ ${d.layoffs.toLocaleString()} layoffs</span>
      </div>
      <div style="font-size:10px;color:#94a3b8;">🏢 ${cos.length} companies tracked · ${hiCos} hiring · ${laCos} layoffs</div>
      <div style="font-size:10px;color:#4a5568;margin-top:4px;">Rank #${rank} nationally</div>
    </div>`;
    L.marker([d.lat,d.lng],{
      icon:L.divIcon({className:'',
        html:`<div style="width:${sz}px;height:${sz}px;background:${c}22;border:2px solid ${c}88;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;${glow}position:relative;">${badge}${fire}</div>`,
        iconSize:[sz,sz],iconAnchor:[sz/2,sz/2]}),
      zIndexOffset:rank===1?1000:500-rank
    })
    .bindTooltip(tt,{permanent:false,direction:'top',opacity:1})
    .on('click',()=>openCity(d.id))
    .addTo(markerLayer);
  });
}
</script>

<script>
// ── City view ─────────────────────────────────────────────────
function openCity(id){
  curCity=id; curCo=null;
  const d=DISTRICTS.find(x=>x.id===id);
  if(!d) return;
  map.flyTo([d.lat,d.lng],9,{duration:.8});
  setHeader(d.name,'Company trends · click company for details',
    `<span class="crumb-link" onclick="goBack()">← All Cities</span>`);
  const cos=CO_BY_CITY[d.name]||[];
  const sorted=[...cos].sort((a,b)=>{
    const score=(x)=>x.status==='hiring'?2:x.status==='layoff'?0:1;
    return score(b)-score(a)||b.hiring-a.hiring;
  });
  const header=`<div class="city-header">
    <div class="city-h-name">${d.name}</div>
    <div class="city-h-sub">Live hiring & layoff signals from pipeline</div>
    <div class="city-stats">
      <div class="cstat"><div class="cstat-v" style="color:var(--green)">${d.hiring.toLocaleString()}</div><div class="cstat-l">Hiring</div></div>
      <div class="cstat"><div class="cstat-v" style="color:var(--red)">${d.layoffs.toLocaleString()}</div><div class="cstat-l">Layoffs</div></div>
      <div class="cstat"><div class="cstat-v" style="color:var(--blue)">${cos.length}</div><div class="cstat-l">Companies</div></div>
      <div class="cstat"><div class="cstat-v" style="color:var(--purple)">+${d.growth.toFixed(1)}</div><div class="cstat-l">Growth</div></div>
    </div>
  </div>`;
  const coHtml=sorted.length?sorted.map(c=>coCard(c,true)).join('')
    :`<div class="empty-state">No company data for this city yet.<br>Pipeline will populate on next run.</div>`;
  document.getElementById('pc').innerHTML=`<div class="animate">${header}${coHtml}</div>`;
  document.getElementById('si').value='';
}

// ── Company card ──────────────────────────────────────────────
function coCard(c, showCity=false){
  const isH=c.status==='hiring',isL=c.status==='layoff';
  const bc=isH?'badge-h':isL?'badge-l':'badge-m';
  const bl=isH?'Hiring':isL?'Layoff':'Mixed';
  const vc=isH?'var(--green)':isL?'var(--red)':'var(--amber)';
  const val=isH?`+${c.hiring.toLocaleString()}`:isL?`-${c.layoffs.toLocaleString()}`:`+${c.hiring}/-${c.layoffs}`;
  const col=avatarColor(c.name);
  const ini=c.name.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();
  const spark=sparkline(c.trend,isH?'#10b981':isL?'#f43f5e':'#f59e0b');
  const trendPct=c.trend.length>=2?((c.trend[c.trend.length-1]-c.trend[0])/c.trend[0]*100).toFixed(0):0;
  const trendStr=trendPct>0?`+${trendPct}%`:`${trendPct}%`;
  const trendColor=trendPct>0?'var(--green)':trendPct<0?'var(--red)':'var(--muted)';
  return `<div class="co-item" onclick="openCompany('${c.name.replace(/'/g,"\\'")}')">
    <div class="co-avatar" style="background:${col}22;color:${col};">${ini}</div>
    <div class="co-body">
      <div class="co-name">${c.name}</div>
      <div class="co-meta">${c.sector} · ${c.size} emp${showCity?'':''}</div>
      ${showCity?`<span class="co-city-tag">📍 ${c.city}</span> `:''}
      <span class="badge ${bc}">${bl}</span>
      ${spark}
    </div>
    <div class="co-right">
      <div class="co-val" style="color:${vc}">${val}</div>
      <div class="co-trend" style="color:${trendColor}">${trendStr} trend</div>
    </div>
  </div>`;
}

// ── Company detail ────────────────────────────────────────────
function openCompany(name){
  const c=COMPANIES_DB.find(x=>x.name===name);
  if(!c) return;
  curCo=name;
  const isH=c.status==='hiring',isL=c.status==='layoff';
  const vc=isH?'var(--green)':isL?'var(--red)':'var(--amber)';
  const bc=isH?'badge-h':isL?'badge-l':'badge-m';
  const bl=isH?'✅ Actively Hiring':isL?'⚠️ Layoffs Reported':'🔄 Mixed Signals';
  const col=avatarColor(c.name);
  const ini=c.name.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();
  const cityD=DISTRICTS.find(d=>d.name===c.city);
  const backLabel=curCity?`← ${c.city}`:'← All Companies';
  const backFn=curCity?`openCity('${c.city.toLowerCase().replace(/ /g,'_')}')`:'renderAllCompanies()';
  setHeader(c.name,`${c.sector} · ${c.city}`,
    `<span class="crumb-link" onclick="${backFn}">${backLabel}</span>`);
  const trendPcts=c.trend.map((v,i)=>i===0?0:((v-c.trend[i-1])/c.trend[i-1]*100).toFixed(1));
  const bigSpark=bigSparkline(c.trend,isH?'#10b981':isL?'#f43f5e':'#f59e0b');
  document.getElementById('pc').innerHTML=`<div class="animate co-detail">
    <div class="co-detail-header">
      <div class="co-detail-avatar" style="background:${col}22;color:${col};">${ini}</div>
      <div>
        <div class="co-detail-name">${c.name}</div>
        <div class="co-detail-meta">${c.sector} · Est. ${c.founded} · ${c.size} employees</div>
        <span class="badge ${bc}" style="margin-top:4px;">${bl}</span>
      </div>
    </div>
    <div class="co-stats">
      <div class="co-stat"><div class="co-stat-v" style="color:var(--green)">${c.hiring.toLocaleString()}</div><div class="co-stat-l">Open Roles</div></div>
      <div class="co-stat"><div class="co-stat-v" style="color:var(--red)">${c.layoffs.toLocaleString()}</div><div class="co-stat-l">Layoffs</div></div>
      <div class="co-stat"><div class="co-stat-v" style="color:var(--blue)">📍${c.city}</div><div class="co-stat-l">HQ City</div></div>
    </div>
    <div style="padding:0 0 10px;">
      <div class="section-title">6-MONTH HIRING TREND</div>
      ${bigSpark}
    </div>
    <div class="section-title">CITY CONTEXT — ${c.city.toUpperCase()}</div>
    ${cityD?`<div style="padding:10px 14px;font-size:11px;color:var(--faint);">
      City has ${cityD.companies} tracked companies · ${cityD.hiring.toLocaleString()} total open roles · ${cityD.layoffs.toLocaleString()} layoffs
      <br><span style="color:var(--cyan);cursor:pointer;" onclick="openCity('${cityD.id}')">View all ${c.city} companies →</span>
    </div>`:''}
    <div class="section-title">OTHER COMPANIES IN ${c.sector.toUpperCase()}</div>
    ${COMPANIES_DB.filter(x=>x.sector===c.sector&&x.name!==c.name).slice(0,4).map(x=>coCard(x,true)).join('')}
  </div>`;
}
</script>

<script>
// ── Search ───────────────────────────────────────────────────────
function doSearch(q){
  searchQ=q.trim();
  document.getElementById('search-clear').style.display=q?'block':'none';
  if(!q){
    if(curCity) openCity(curCity);
    else renderRankings(curMode==='search'?'hiring':curMode);
    return;
  }
  const ql=q.toLowerCase();
  const cityMatches=DISTRICTS.filter(d=>d.name.toLowerCase().includes(ql));
  const coMatches=COMPANIES_DB.filter(c=>{
    const nameMatch=c.name.toLowerCase().includes(ql);
    const sectorMatch=c.sector.toLowerCase().includes(ql);
    const cityMatch=c.city.toLowerCase().includes(ql);
    if(searchType==='city')    return cityMatch;
    if(searchType==='company') return nameMatch||sectorMatch;
    if(searchType==='hiring')  return (nameMatch||sectorMatch||cityMatch)&&c.status==='hiring';
    if(searchType==='layoff')  return (nameMatch||sectorMatch||cityMatch)&&c.status==='layoff';
    return nameMatch||sectorMatch||cityMatch||cityMatches.some(cd=>cd.name===c.city);
  });
  setHeader(`Search: "${q}"`,`${cityMatches.length} cities · ${coMatches.length} companies`,'');
  let html='';
  if(cityMatches.length&&searchType!=='company'){
    html+=`<div class="section-title">CITIES (${cityMatches.length})</div>`;
    html+=cityMatches.map(d=>{
      const rank=d['r_hiring'];
      const nc=rank===1?'rk-1':rank===2?'rk-2':rank===3?'rk-3':'rk-n';
      return `<div class="rk-item" onclick="openCity('${d.id}')">
        <div class="rk-num ${nc}">${rank}</div>
        <div class="rk-body"><div class="rk-name">${d.name}</div>
          <div class="rk-bar" style="width:${Math.round(d.hiring/100)}%;background:#10b981;"></div></div>
        <div class="rk-right"><div class="rk-val" style="color:#10b981">${d.hiring.toLocaleString()}</div><div class="rk-sub">open roles</div></div>
      </div>`;
    }).join('');
  }
  if(coMatches.length&&searchType!=='city'){
    html+=`<div class="section-title">COMPANIES (${coMatches.length})</div>`;
    html+=coMatches.map(c=>coCard(c,true)).join('');
  }
  if(!html) html=`<div class="empty-state">No results for "<b>${q}</b>"<br>Try searching a company name, sector, or city</div>`;
  document.getElementById('pc').innerHTML=`<div class="animate">${html}</div>`;
}

function clearSearch(){
  document.getElementById('si').value='';
  document.getElementById('search-clear').style.display='none';
  searchQ='';
  if(curCity) openCity(curCity);
  else renderRankings(curMode==='search'?'hiring':curMode);
}

function setSearchType(type,btn){
  searchType=type;
  document.querySelectorAll('.st-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  if(searchQ) doSearch(searchQ);
}

// ── Rankings ─────────────────────────────────────────────────────
function renderRankings(mode,filter=''){
  const cfg=MODE[mode];
  setHeader(`Top Cities by ${cfg.label}`,'Click any city bubble on the map','');
  let list=filter
    ?DISTRICTS.filter(d=>d.name.toLowerCase().includes(filter.toLowerCase()))
    :[...DISTRICTS].sort((a,b)=>b[mode]-a[mode]).slice(0,15);
  const maxV=Math.max(...list.map(d=>d[mode]),1);
  document.getElementById('pc').innerHTML='<div class="animate">'+list.map((d,i)=>{
    const rank=filter?d['r_'+mode]:i+1;
    const nc=rank===1?'rk-1':rank===2?'rk-2':rank===3?'rk-3':'rk-n';
    const val=mode==='growth'?`+${d[mode].toFixed(1)}`:d[mode].toLocaleString();
    const bp=Math.round(d[mode]/maxV*100);
    const cos=CO_BY_CITY[d.name]||[];
    const hiN=cos.filter(c=>c.status==='hiring').length;
    const laN=cos.filter(c=>c.status==='layoff').length;
    return `<div class="rk-item${curCity===d.id?' on':''}" onclick="openCity('${d.id}')" style="--mc:${cfg.color}">
      <div class="rk-num ${nc}">${rank}</div>
      <div class="rk-body">
        <div class="rk-name">${d.name}</div>
        <div class="rk-meta">${cos.length} cos · <span style="color:var(--green)">▲${hiN}</span> <span style="color:var(--red)">▼${laN}</span></div>
        <div class="rk-bar" style="width:${bp}%;background:${cfg.color};"></div>
      </div>
      <div class="rk-right">
        <div class="rk-val" style="color:${cfg.color}">${val}</div>
        <div class="rk-sub">${cfg.unit}</div>
      </div>
    </div>`;
  }).join('')+'</div>';
}

function renderAllCompanies(){
  curCity=null; curCo=null;
  setHeader('All Companies','Search or filter by city, sector, or status','');
  const sorted=[...COMPANIES_DB].sort((a,b)=>b.hiring-a.hiring);
  document.getElementById('pc').innerHTML='<div class="animate">'+sorted.map(c=>coCard(c,true)).join('')+'</div>';
}
</script>

<script>
// ── Sparklines ───────────────────────────────────────────────────
function sparkline(data,color){
  if(!data||!data.length) return '';
  const max=Math.max(...data),min=Math.min(...data),range=max-min||1;
  const bars=data.map(v=>{
    const h=Math.max(2,Math.round(((v-min)/range)*18));
    return `<span style="height:${h}px;background:${color};opacity:.7;"></span>`;
  }).join('');
  return `<div class="trend-bar">${bars}</div>`;
}

function bigSparkline(data,color){
  if(!data||!data.length) return '';
  const max=Math.max(...data),min=Math.min(...data),range=max-min||1;
  const w=320,h=60,pad=4;
  const pts=data.map((v,i)=>{
    const x=pad+(i/(data.length-1))*(w-pad*2);
    const y=h-pad-((v-min)/range)*(h-pad*2);
    return `${x},${y}`;
  }).join(' ');
  const area=`${pad},${h} ${pts} ${w-pad},${h}`;
  const months=['6M ago','5M','4M','3M','2M','1M','Now'].slice(-data.length);
  const labels=months.map((m,i)=>{
    const x=pad+(i/(data.length-1))*(w-pad*2);
    return `<text x="${x}" y="${h+14}" text-anchor="middle" font-size="9" fill="#6b7a96">${m}</text>`;
  }).join('');
  return `<div style="padding:0 14px;">
    <svg width="100%" viewBox="0 0 ${w} ${h+20}" style="overflow:visible;">
      <defs><linearGradient id="sg" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${color}" stop-opacity=".3"/>
        <stop offset="100%" stop-color="${color}" stop-opacity=".02"/>
      </linearGradient></defs>
      <polygon points="${area}" fill="url(#sg)"/>
      <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round"/>
      ${data.map((v,i)=>{
        const x=pad+(i/(data.length-1))*(w-pad*2);
        const y=h-pad-((v-min)/range)*(h-pad*2);
        return `<circle cx="${x}" cy="${y}" r="3" fill="${color}"/>`;
      }).join('')}
      ${labels}
    </svg>
  </div>`;
}

// ── Helpers ──────────────────────────────────────────────────────
function avatarColor(name){
  const p=['#06b6d4','#8b5cf6','#10b981','#f59e0b','#3b82f6','#ec4899','#f43f5e','#84cc16'];
  let h=0; for(let c of name) h=(h*31+c.charCodeAt(0))%p.length;
  return p[h];
}

function setHeader(title,sub,crumb){
  document.getElementById('ph-title').textContent=title;
  document.getElementById('ph-sub').textContent=sub;
  const el=document.getElementById('ph-crumb');
  el.innerHTML=crumb;
  el.style.display=crumb?'block':'none';
}

function goBack(){
  curCity=null; curCo=null;
  map.flyTo([20.5937,78.9629],5,{duration:.8});
  renderRankings(curMode==='search'?'hiring':curMode);
}

function setMode(mode,btn){
  curMode=mode; curCity=null; curCo=null;
  document.querySelectorAll('.mbt').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  if(mode==='search'){
    buildMarkers('hiring');
    setHeader('Search','Type company name, city, or sector','');
    document.getElementById('pc').innerHTML='<div class="empty-state">Start typing above to search<br>cities and companies…</div>';
    document.getElementById('si').focus();
  } else {
    buildMarkers(mode);
    renderRankings(mode);
  }
  document.getElementById('si').value='';
  document.getElementById('search-clear').style.display='none';
}

function focusAnswer(mode){
  const idx=['hiring','layoffs','companies','growth'].indexOf(mode);
  const btn=document.querySelectorAll('.mbt')[idx];
  if(btn) setMode(mode,btn);
}

function updateAnswerCards(){
  if(!DISTRICTS.length) return;
  const sH=[...DISTRICTS].sort((a,b)=>b.hiring-a.hiring)[0];
  const sL=[...DISTRICTS].sort((a,b)=>b.layoffs-a.layoffs)[0];
  const sC=[...DISTRICTS].sort((a,b)=>b.companies-a.companies)[0];
  const sG=[...DISTRICTS].sort((a,b)=>b.growth-a.growth)[0];
  document.getElementById('a-h-city').textContent=sH.name;
  document.getElementById('a-h-val').textContent=`${sH.hiring.toLocaleString()} roles`;
  document.getElementById('a-l-city').textContent=sL.name;
  document.getElementById('a-l-val').textContent=`${sL.layoffs.toLocaleString()} affected`;
  document.getElementById('a-c-city').textContent=sC.name;
  document.getElementById('a-c-val').textContent=`${sC.companies} companies`;
  document.getElementById('a-g-city').textContent=sG.name;
  document.getElementById('a-g-val').textContent=`+${sG.growth.toFixed(1)} score`;
}

function buildSectorBar(){
  const segs=[
    {l:'IT/Tech',p:38,c:'#10b981'},{l:'Finance',p:14,c:'#3b82f6'},
    {l:'Mfg',p:19,c:'#f59e0b'},{l:'E-Comm',p:10,c:'#8b5cf6'},
    {l:'Health',p:6,c:'#ec4899'},{l:'Fintech',p:7,c:'#84cc16'},
    {l:'EdTech▼',p:6,c:'#f43f5e'},
  ];
  document.getElementById('sbar').innerHTML=segs.map(s=>
    `<div class="sb-seg" style="flex:${s.p};background:${s.c}18;color:${s.c};border-right:1px solid var(--border);" title="${s.l}">${s.p>8?s.l:''}</div>`
  ).join('');
}

let tickIdx=0;
function rotateTicker(){
  const el=document.getElementById('tick-text');
  el.classList.add('fade');
  setTimeout(()=>{tickIdx=(tickIdx+1)%INSIGHTS.length;el.textContent=INSIGHTS[tickIdx];el.classList.remove('fade');},400);
}
function updateClock(){
  const n=new Date();
  document.getElementById('clock').textContent=
    String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0')+':'+String(n.getSeconds()).padStart(2,'0');
}

setInterval(updateClock,1000);
setInterval(rotateTicker,5000);
updateClock();
</script>
