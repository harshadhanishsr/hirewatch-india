# ════════════════════════════════════════════════════════════════
# HireWatch India — Automated Data Pipeline
# Runs FREE on GitHub Actions (public repo = unlimited minutes)
# Schedule: every hour. Change cron to adjust.
#
# ZERO COST STACK:
#   GitHub Actions    → scraping + processing + orchestration (free)
#   AWS S3 Free Tier  → raw data storage (5GB, 20K GETs free)
#   Databricks CE     → heavy Spark processing (free community edition)
#   GitHub Pages      → dashboard hosting (free)
#   GitHub repo       → Gold JSON serving (free via raw.githubusercontent.com)
# ════════════════════════════════════════════════════════════════

name: HireWatch India — Hourly Data Pipeline

on:
  schedule:
    - cron: '0 * * * *'        # Every hour at :00 — change to '*/30 * * * *' for 30-min
  workflow_dispatch:            # Also allows manual trigger from GitHub UI

env:
  AWS_REGION: ap-south-1       # Mumbai region (closest to India data)
  S3_RAW_BUCKET: hirewatch-raw-india
  S3_GOLD_BUCKET: hirewatch-gold-india

jobs:

  # ─────────────────────────────────────────────────────────
  # STAGE 1: INGEST — Scrape all sources in parallel
  # ─────────────────────────────────────────────────────────
  ingest:
    name: "Stage 1 — Ingest Raw Data"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements_pipeline.txt

      - name: Configure AWS credentials (S3 free tier)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Scrape Naukri job listings
        run: python pipeline/scrapers/scrape_naukri.py
        env:
          S3_BUCKET: ${{ env.S3_RAW_BUCKET }}
          RUN_TS:    ${{ github.run_id }}

      - name: Scrape LinkedIn public job data
        run: python pipeline/scrapers/scrape_linkedin.py
        env:
          S3_BUCKET: ${{ env.S3_RAW_BUCKET }}
          RUN_TS:    ${{ github.run_id }}

      - name: Fetch EPFO employment data (govt open API)
        run: python pipeline/scrapers/fetch_epfo.py
        env:
          S3_BUCKET: ${{ env.S3_RAW_BUCKET }}
          RUN_TS:    ${{ github.run_id }}

      - name: Scrape news for layoff signals (ET, Moneycontrol, Mint)
        run: python pipeline/scrapers/scrape_layoff_news.py
        env:
          S3_BUCKET:    ${{ env.S3_RAW_BUCKET }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}   # newsapi.org free tier (100 req/day)
          RUN_TS:       ${{ github.run_id }}

      - name: Sync MCA21 company master delta (Mondays only)
        # github.event.schedule is only set when triggered by cron, not workflow_dispatch
        if: github.event_name == 'schedule'
        run: python pipeline/scrapers/sync_mca21.py
        env:
          S3_BUCKET: ${{ env.S3_RAW_BUCKET }}
          RUN_TS:    ${{ github.run_id }}

      - name: Upload raw manifest to S3
        run: |
          echo "{\"batch_ts\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\", \"run_id\": \"${{ github.run_id }}\"}" \
            > /tmp/manifest.json
          aws s3 cp /tmp/manifest.json \
            s3://${{ env.S3_RAW_BUCKET }}/manifests/$(date -u +%Y/%m/%d/%H)/manifest.json

  # ─────────────────────────────────────────────────────────
  # STAGE 2: PROCESS — Databricks Community Edition
  #   Triggered via REST API after ingestion completes.
  #   Databricks CE is free — no paid cluster needed.
  # ─────────────────────────────────────────────────────────
  process:
    name: "Stage 2 — Databricks Processing"
    needs: ingest
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Trigger Databricks notebook via REST API
        run: |
          curl -s -X POST "${{ secrets.DATABRICKS_HOST }}/api/2.0/jobs/run-now" \
            -H "Authorization: Bearer ${{ secrets.DATABRICKS_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "job_id": ${{ secrets.DATABRICKS_JOB_ID }},
              "notebook_params": {
                "s3_raw_bucket":  "${{ env.S3_RAW_BUCKET }}",
                "s3_gold_bucket": "${{ env.S3_GOLD_BUCKET }}",
                "batch_ts":       "'"$(date -u +%Y-%m-%dT%H:%M:%SZ)"'",
                "run_id":         "${{ github.run_id }}"
              }
            }' > /tmp/run_response.json
          cat /tmp/run_response.json
          echo "RUN_ID=$(jq -r '.run_id' /tmp/run_response.json)" >> $GITHUB_ENV

      - name: Wait for Databricks job to complete (poll every 30s)
        run: |
          for i in {1..24}; do
            STATE=$(curl -s "${{ secrets.DATABRICKS_HOST }}/api/2.0/jobs/runs/get?run_id=$RUN_ID" \
              -H "Authorization: Bearer ${{ secrets.DATABRICKS_TOKEN }}" \
              | jq -r '.state.life_cycle_state')
            echo "[$i/24] Databricks state: $STATE"
            if [[ "$STATE" == "TERMINATED" ]]; then
              RESULT=$(curl -s "${{ secrets.DATABRICKS_HOST }}/api/2.0/jobs/runs/get?run_id=$RUN_ID" \
                -H "Authorization: Bearer ${{ secrets.DATABRICKS_TOKEN }}" \
                | jq -r '.state.result_state')
              echo "Result: $RESULT"
              [[ "$RESULT" == "SUCCESS" ]] && exit 0 || exit 1
            fi
            sleep 30
          done
          echo "Databricks job timed out" && exit 1

  # ─────────────────────────────────────────────────────────
  # STAGE 3: SERVE — Pull Gold JSON, commit to repo
  #   GitHub Pages serves /docs/data/*.json directly.
  #   Dashboard JS fetches from same repo. Zero CDN cost.
  # ─────────────────────────────────────────────────────────
  serve:
    name: "Stage 3 — Publish to GitHub Pages"
    needs: process
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Pull Gold JSON files from S3
        run: |
          mkdir -p docs/data
          # ETL writes to s3://<gold-bucket>/data/ — sync entire prefix
          aws s3 sync s3://${{ env.S3_GOLD_BUCKET }}/data/ docs/data/ \
            --delete

      - name: Write data freshness timestamp
        run: |
          echo "{\"last_updated\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\", \"batch_run\": \"${{ github.run_id }}\"}" \
            > docs/data/meta.json

      - name: Commit and push updated data
        run: |
          git config user.name  "HireWatch Bot"
          git config user.email "hirewatch-bot@users.noreply.github.com"
          git add docs/data/
          git diff --staged --quiet || git commit -m \
            "data: batch update $(date -u '+%Y-%m-%d %H:%M UTC') [skip ci]"
          git push

  # ─────────────────────────────────────────────────────────
  # STAGE 4: NOTIFY — Alert on failure (free via GitHub)
  # ─────────────────────────────────────────────────────────
  notify-failure:
    name: "Notify on Failure"
    needs: [ingest, process, serve]
    runs-on: ubuntu-latest
    if: failure()
    steps:
      - name: Create GitHub Issue on pipeline failure
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: `⚠️ Pipeline failed — ${new Date().toISOString()}`,
              body:  `Pipeline run [#${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) failed.\n\nCheck logs above.`,
              labels: ['pipeline-failure']
            })
